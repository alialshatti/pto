version: '3.8'
services:
  minio:
    image: minio/minio:latest
    container_name: ota-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  createbuckets:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc rm -r --force myminio/invoices;
      /usr/bin/mc rm -r --force myminio/validation-reports;
      /usr/bin/mc mb myminio/invoices;
      /usr/bin/mc mb myminio/validation-reports;
      exit 0;
      "

volumes:
  pg-data:
  minio-data:
